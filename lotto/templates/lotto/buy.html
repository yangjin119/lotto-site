<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6/45 로또 구매 페이지</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; }
        .number-inputs { display: flex; gap: 10px; justify-content: space-between; }
        .number-inputs input { width: 50px; height: 50px; text-align: center; font-size: 18px; border: 2px solid #ccc; border-radius: 4px; }
        .number-inputs input:disabled { background-color: #e9e9e9; cursor: not-allowed; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .message { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎟️ 6/45 로또 복권 구매</h1>
    <p style="text-align: center; color: #666;">로그인 중인 사용자: <strong>{{ user.username }}</strong></p>
    <hr>

    <form id="lottoForm" method="POST" action="{% url 'lotto:buy_lotto' %}">
        {% csrf_token %}
        
        <div class="form-group">
            <label>구매 방식을 선택하세요</label>
            <div class="radio-group">
                <label><input type="radio" name="purchase_type" value="AUTO" checked onclick="toggleInputs(true)"> 자동 생성</label>
                <label><input type="radio" name="purchase_type" value="MANUAL" onclick="toggleInputs(false)"> 수동 선택</label>
            </div>
        </div>

        <div class="form-group">
            <label>로또 번호 입력 (1 ~ 45)</label>
            <div class="number-inputs">
                <input type="number" name="num1" min="1" max="45" required disabled>
                <input type="number" name="num2" min="1" max="45" required disabled>
                <input type="number" name="num3" min="1" max="45" required disabled>
                <input type="number" name="num4" min="1" max="45" required disabled>
                <input type="number" name="num5" min="1" max="45" required disabled>
                <input type="number" name="num6" min="1" max="45" required disabled>
            </div>
        </div>

        <button type="submit">복권 구매하기</button>
    </form>

    <div id="resultMessage" class="message"></div>
</div>

<script>
    function toggleInputs(isAuto) {
        const inputs = document.querySelectorAll('.number-inputs input');
        inputs.forEach(input => {
            input.disabled = isAuto;
            if (isAuto) input.value = '';
        });
    }

    document.getElementById('lottoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const msgDiv = document.getElementById('resultMessage');

        fetch(this.action, {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => response.json())
        .then(data => {
            msgDiv.style.display = 'block';
            if (data.error) {
                msgDiv.className = 'message error';
                msgDiv.innerText = '❌ 오류: ' + data.error;
            } else {
                msgDiv.className = 'message success';
                msgDiv.innerHTML = `
                    <h3>🎉 구매 성공!</h3>
                    <p><strong>회차:</strong> 제 ${data.round}회</p>
                    <p><strong>방식:</strong> ${data.type}</p>
                    <p><strong>발급된 번호:</strong> [ ${data.numbers.join(', ')} ]</p>
                `;
            }
        });
    });
</script>

</body>
</html>
